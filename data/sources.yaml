  # ══════════════════════════════════════════
  # [8] 네이버 카페 (커뮤니티 VOC / SNS 동향)
  # 환경변수 NAVER_CLIENT_ID + NAVER_CLIENT_SECRET 있으면 공식 API 사용
  # 없으면 HTML 스크래핑 fallback
  # ══════════════════════════════════════════

  - id: naver_cafe_kakaot
    type: naver_cafe
    service_id: kakaot_parking
