  # ══════════════════════════════════════════
  # [4] 앱스토어 리뷰 수집 (Google Play + iOS App Store)
  # flag_below_rating: 5 = 1~5점 전체 수집 (경쟁사 모니터링용)
  # review_count: Google Play 최근 N개 / max_pages: iOS RSS 페이지 수(1페이지=최대50건)
  # ══════════════════════════════════════════

  # 모두의주차장
  - id: reviews_moduparking_android
    type: appstore
    platform: google_play
    app_id: "com.parkingshare.mobile"
    service_id: moduparking
    flag_below_rating: 5
    review_count: 50

  - id: reviews_moduparking_ios
    type: ios_appstore
    app_id: "780174422"
    service_id: moduparking
    flag_below_rating: 5
    max_pages: 2

  # 파킹프렌즈
  - id: reviews_parkingfriends_android
    type: appstore
    platform: google_play
    app_id: "com.misconct.parkingfriends"
