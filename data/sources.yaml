# 매일 크롤링할 소스 정의
# type: rss / naver_blog / naver_news / appstore / ios_appstore

sources:

  # ══════════════════════════════════════════
  # [1] 뉴스 RSS — Google News (서비스별 키워드는 services.json 참조)
  # ══════════════════════════════════════════

  - id: google_news_rss
    type: rss
    url_template: "https://news.google.com/rss/search?q={KEYWORD}+when:7d&hl=ko&gl=KR&ceid=KR:ko"
    days_back: 7

  # ══════════════════════════════════════════
  # [2] 네이버 블로그 검색
  # ══════════════════════════════════════════

  - id: naver_blog_kakaot
    type: naver_blog
    search_type: blog
    service_id: kakaot_parking
    keywords: ["카카오T 주차", "카카오모빌리티 주차장", "케이엠파킹"]
    days_back: 14

  - id: naver_blog_iparking
    type: naver_blog
    search_type: blog
    service_id: iparking
    keywords: ["아이파킹 주차", "파킹클라우드 주차"]
    days_back: 14

  - id: naver_blog_nicepark
    type: naver_blog
    search_type: blog
    service_id: nicepark
    keywords: ["나이스파크 주차", "NICEPARK"]
