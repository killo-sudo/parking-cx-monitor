  # ══════════════════════════════════════════
  # iOS 앱 ID 찾는 방법 (주석)
  # ══════════════════════════════════════════
  # 브라우저에서 아래 URL 접속 후 trackId 값을 app_id로 사용:
  # https://itunes.apple.com/search?term=앱이름&country=kr&entity=software&limit=5
  # 예) term=투루파킹, term=파킹프렌즈, term=주만사

  # ══════════════════════════════════════════
  # SNS 수집 가능 여부 정리
  # ══════════════════════════════════════════
  # YouTube  : 위 [7]번에서 공식 RSS로 수집 중 ✅
  # NaverCafe: 위 [8]번에서 수집 중 ✅
  # Twitter/X: 유료 API만 가능 ($100/월), 무료 스크래핑 불안정 ❌
  # Instagram: 강력한 봇 차단, 공식 API도 비즈니스 계정 필요 ❌
  # Facebook : 공개 콘텐츠 API 종료됨 ❌
