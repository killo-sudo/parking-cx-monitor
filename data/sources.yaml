# 매일 크롤링할 소스 정의
# type: rss / html_list / html_diff / appstore / ios_appstore / app_info / youtube_rss

sources:

  # ══════════════════════════════════════════
  # [1] 뉴스 RSS — Google News (서비스별 키워드는 services.json 참조)
  # ══════════════════════════════════════════

  - id: google_news_rss
    type: rss
    url_template: "https://news.google.com/rss/search?q={KEYWORD}+when:7d&hl=ko&gl=KR&ceid=KR:ko"
    days_back: 7

  # ══════════════════════════════════════════
  # [2] 네이버 블로그 검색
  # ══════════════════════════════════════════

  - id: naver_blog_kakaot
    type: naver_blog
    search_type: blog
    service_id: kakaot_parking
    keywords: ["카카오T 주차", "카카오모빌리티 주차장", "케이엠파킹"]
    days_back: 14

  - id: naver_blog_iparking
    type: naver_blog
    search_type: blog
    service_id: iparking
    keywords: ["아이파킹 주차", "파킹클라우드 주차"]
    days_back: 14

  - id: naver_blog_nicepark
    type: naver_blog
    search_type: blog
    service_id: nicepark
    keywords: ["나이스파크 주차", "NICEPARK"]
    days_back: 14

  - id: naver_blog_amano
    type: naver_blog
    search_type: blog
    service_id: amano_korea
    keywords: ["아마노코리아 주차", "아마노 주차장"]
    days_back: 14

  - id: naver_blog_highparking
    type: naver_blog
    search_type: blog
    service_id: highparking
    keywords: ["투루파킹", "하이파킹 주차", "휴맥스모빌리티 주차"]
    days_back: 14

  - id: naver_blog_parkingfriends
    type: naver_blog
    search_type: blog
    service_id: parkingfriends
    keywords: ["파킹프렌즈", "MDS모빌리티 주차"]
    days_back: 14

  - id: naver_blog_zoomansa
    type: naver_blog
    search_type: blog
    service_id: zoomansa
    keywords: ["주만사 주차", "주만사 월정기권"]
    days_back: 14

  - id: naver_blog_moduparking
    type: naver_blog
    search_type: blog
    service_id: moduparking
    keywords: ["모두의주차장"]
    days_back: 14

  # ══════════════════════════════════════════
  # [3] 네이버 뉴스 검색
  # ══════════════════════════════════════════

  - id: naver_news_kakaot
    type: naver_news
    search_type: news
    service_id: kakaot_parking
    keywords: ["카카오T 주차", "카카오모빌리티 주차"]
    days_back: 14

  - id: naver_news_iparking
    type: naver_news
    search_type: news
    service_id: iparking
    keywords: ["아이파킹", "파킹클라우드 주차"]
    days_back: 14

  - id: naver_news_nicepark
    type: naver_news
    search_type: news
    service_id: nicepark
    keywords: ["나이스파크 주차"]
    days_back: 14

  - id: naver_news_amano
    type: naver_news
    search_type: news
    service_id: amano_korea
    keywords: ["아마노코리아 주차"]
    days_back: 14

  - id: naver_news_highparking
    type: naver_news
    search_type: news
    service_id: highparking
    keywords: ["투루파킹", "하이파킹"]
    days_back: 14

  - id: naver_news_parkingfriends
    type: naver_news
    search_type: news
    service_id: parkingfriends
    keywords: ["파킹프렌즈"]
    days_back: 14

  - id: naver_news_zoomansa
    type: naver_news
    search_type: news
    service_id: zoomansa
    keywords: ["주만사 주차"]
    days_back: 14

  - id: naver_news_moduparking
    type: naver_news
    search_type: news
    service_id: moduparking
    keywords: ["모두의주차장"]
    days_back: 14

  # ══════════════════════════════════════════
  # [4] 보도자료 HTML 리스트
  # ══════════════════════════════════════════

  - id: kakaomobility_news
    type: html_list
    url: "https://www.kakaomobility.com/newsroom"
    service_id: kakaot_parking
    item_selector: "article, .news-item, li.item, .newsroom-item"
    title_selector: "h2 a, h3 a, .title a, a"
    date_selector: ".date, time, .news-date"
    link_selector: "h2 a, h3 a, .title a, a"
    base_url: "https://www.kakaomobility.com"

  - id: humax_news
    type: html_list
    url: "https://holdings.humaxdigital.com/category/news"
    service_id: highparking
    item_selector: "article"
    title_selector: "h2 a, h3 a, .entry-title a"
    date_selector: ".entry-date, time"
    link_selector: "h2 a, h3 a, .entry-title a"
    base_url: "https://holdings.humaxdigital.com"

  # ══════════════════════════════════════════
  # [3] 홈페이지 변경 감지 (실제 변경 내용 추출)
  # ══════════════════════════════════════════

  - id: kakaot_home
    type: html_diff
    url: "https://www.kakaomobility.com/service-kakaot/parking"
    service_id: kakaot_parking
    selector: "main, .content, #main"

  - id: amano_home
    type: html_diff
    url: "https://www.amano.co.kr/"
    service_id: amano_korea
    selector: ".news, .notice, #news, main"

  - id: highparking_home
    type: html_diff
    url: "https://turuparking.com/"
    service_id: highparking
    selector: "main, .content"

  - id: parkingfriends_home
    type: html_diff
    url: "https://www.hmobility.co.kr/parking"
    service_id: parkingfriends
    selector: "main, #content"

  - id: zoomansa_home
    type: html_diff
    url: "https://www.zoomansa.com"
    service_id: zoomansa
    selector: "main, #content, .content"

  - id: moduparking_home
    type: html_diff
    url: "https://www.moduparking.com"
    service_id: moduparking
    selector: "main, .content, #main"

  # ══════════════════════════════════════════
