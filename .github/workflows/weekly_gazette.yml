name: Weekly Gazette

on:
  # 스케줄 비활성화 — Daily Crawl에 통합됨 (매일 실행, 같은 주 내 dedup 안전)
  # 이 워크플로우는 수동 백업용으로만 유지
  workflow_dispatch:

jobs:
  gazette:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gazette_meta.json 히스토리 보존

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Generate gazette
        run: python backend/weekly_report.py

      - name: Commit gazette files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/gazette_latest.html
          git add -f docs/gazette_*.html 2>/dev/null || true
          git add -f docs/gazette_meta.json
          echo "=== staged ==="
          git diff --cached --stat
          if ! git diff --cached --quiet; then
            git commit -m "chore: weekly gazette $(date +'%Y-%m-%d') [skip ci]"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Nothing to commit"
          fi
