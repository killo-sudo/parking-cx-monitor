name: Daily Crawl

on:
  schedule:
    - cron: "15 22 * * *"   # KST 07:15 (UTC 22:15 전일) — 정시(00분) GH Actions 피크 회피
  workflow_dispatch:         # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # docs/ 커밋용

    env:
      GOOGLE_CREDENTIALS:    ${{ secrets.GOOGLE_CREDENTIALS }}
      SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
      EVENTS_SPREADSHEET_ID: ${{ secrets.EVENTS_SPREADSHEET_ID }}
      NAVER_CLIENT_ID:       ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET:   ${{ secrets.NAVER_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run crawler
        run: python backend/daily_crawl.py

      - name: Update docs/app_info.json
        run: |
          if [ -f data/app_info.json ]; then
            cp data/app_info.json docs/app_info.json
          fi
          if [ -f data/datalab_trends.json ]; then
            cp data/datalab_trends.json docs/datalab_trends.json
          fi

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data.json
          git add -f docs/events.json 2>/dev/null || true
          git add -f docs/app_info.json docs/datalab_trends.json 2>/dev/null || true
          git add data/ 2>/dev/null || true
          echo "=== git status ==="
          git status --short
          echo "=== staged diff stat ==="
          git diff --cached --stat
          if ! git diff --cached --quiet; then
            git commit -m "chore: update data.json + app_info.json [skip ci]"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Nothing to commit — data.json unchanged"
          fi
