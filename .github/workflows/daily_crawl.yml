name: Daily Crawl

on:
  schedule:
    - cron: "0 22 * * *"   # KST 07:00 (UTC 22:00 전일)
  workflow_dispatch:         # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # docs/ 커밋용

    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
      NAVER_CLIENT_ID:    ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python backend/daily_crawl.py

      - name: Update docs/app_info.json
        run: |
          if [ -f data/app_info.json ]; then
            cp data/app_info.json docs/app_info.json
          fi

      - name: Commit updated app_info
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/app_info.json
          git diff --staged --quiet || git commit -m "chore: update app_info.json [skip ci]"
          git push
