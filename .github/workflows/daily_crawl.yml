name: Daily Crawl

on:
  schedule:
    # GitHub Actions schedule은 best-effort라 자주 누락/지연됨 → 여러 시점에 분산 등록 (dedup 있음)
    - cron: "15 22 * * *"   # KST 07:15
    - cron: "45 22 * * *"   # KST 07:45 (백업)
    - cron: "15 23 * * *"   # KST 08:15 (백업)
  workflow_dispatch:         # 수동 실행 가능
    inputs:
      full_backfill:
        description: '1년치 전체 백필 (기본은 14일 증분)'
        type: boolean
        default: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # docs/ 커밋용

    env:
      GOOGLE_CREDENTIALS:    ${{ secrets.GOOGLE_CREDENTIALS }}
      SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
      NAVER_CLIENT_ID:       ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET:   ${{ secrets.NAVER_CLIENT_SECRET }}
      APIFY_TOKEN:           ${{ secrets.APIFY_TOKEN }}
      APPFOLLOW_API_TOKEN:   ${{ secrets.APPFOLLOW_API_TOKEN }}
      # full_backfill=true면 FORCE_FULL_CRAWL=1 (스케줄 실행 시엔 빈 값)
      FORCE_FULL_CRAWL:      ${{ inputs.full_backfill == true && '1' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run crawler
        run: python backend/daily_crawl.py

      # 자체 크롤은 모두의주차장 앱 리뷰를 누락하므로(iTunes RSS 지연·GP IP 차단),
      # AppFollow 완전판으로 덮어써 data.json의 modu 리뷰를 항상 완전하게 유지.
      - name: Refresh app reviews (AppFollow 완전 수집)
        run: python scripts/refresh_app_reviews.py --months 2

      - name: Update docs/app_info.json
        run: |
          if [ -f data/app_info.json ]; then
            cp data/app_info.json docs/app_info.json
          fi

      - name: Generate weekly gazette
        # get_period()가 항상 "최근 완료된 전주"라 매일 실행해도 안전 (week_num dedup)
        run: python backend/weekly_report.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data.json
          git add -f docs/app_info.json 2>/dev/null || true
          git add -f docs/gazette_latest.html 2>/dev/null || true
          git add -f docs/gazette_*.html 2>/dev/null || true
          git add -f docs/gazette_meta.json 2>/dev/null || true
          git add data/ 2>/dev/null || true
          echo "=== git status ==="
          git status --short
          echo "=== staged diff stat ==="
          git diff --cached --stat
          if ! git diff --cached --quiet; then
            git commit -m "chore: update data.json + app_info.json [skip ci]"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Nothing to commit — data.json unchanged"
          fi
